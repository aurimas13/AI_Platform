<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDFBF6"/>
      <stop offset="0.55" stop-color="#F4ECD9"/>
      <stop offset="1" stop-color="#EFE3C7"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D4A452"/>
      <stop offset="1" stop-color="#845B1E"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C1917"/>
      <stop offset="1" stop-color="#292524"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1C1917" flood-opacity="0.10"/>
    </filter>
    <filter id="lightShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1C1917" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- decorative hexagons -->
  <g opacity="0.045" stroke="#1C1917" stroke-width="1.6" fill="none">
    <polygon points="1080,80 1130,108 1130,164 1080,192 1030,164 1030,108"/>
    <polygon points="1170,200 1220,228 1220,284 1170,312 1120,284 1120,228"/>
    <polygon points="1080,320 1130,348 1130,404 1080,432 1030,404 1030,348"/>
    <polygon points="60,940 110,968 110,1024 60,1052 10,1024 10,968"/>
    <polygon points="160,820 210,848 210,904 160,932 110,904 110,848"/>
    <polygon points="40,720 90,748 90,804 40,832 -10,804 -10,748"/>
  </g>

  <!-- ============ TOP BAR (y: 80-140) ============ -->
  <g transform="translate(80, 80)">
    <polygon points="26,0 54,15 54,45 26,60 -2,45 -2,15" fill="url(#brass)"/>
    <text x="74" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#1C1917" letter-spacing="-0.4">AI Gateway</text>
    <g transform="translate(248, 8)">
      <rect x="0" y="0" width="172" height="44" rx="22" fill="#FBF5E9" stroke="#EACD8F" stroke-width="1.5"/>
      <text x="86" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#845B1E" text-anchor="middle" letter-spacing="2.2">PLG · CASE STUDY</text>
    </g>
  </g>

  <g transform="translate(1120, 110)">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" font-weight="600" fill="#845B1E" text-anchor="end">gateway.aurimas.io</text>
  </g>

  <!-- ============ HEADLINE BLOCK (y: 200-660) ============ -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="56" height="4" rx="2" fill="url(#brass)"/>
    <text x="0" y="42" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#845B1E" letter-spacing="3.2">SOLVING THE COLD-START PROBLEM</text>

    <!-- 3 lines * 78 = 234 px tall -->
    <text x="0" y="100" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#1C1917" letter-spacing="-2.5">
      <tspan x="0" dy="0">AI onboarding,</tspan>
      <tspan x="0" dy="82">designed for</tspan>
      <tspan x="0" dy="82" fill="#845B1E">activation.</tspan>
    </text>

    <!-- subhead at 100+234+58=392 -->
    <text x="0" y="380" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#57534E" letter-spacing="-0.3">
      <tspan x="0" dy="0">A working PLG prototype that replaces the blank chat with</tspan>
      <tspan x="0" dy="32">role-based onboarding, A/B testing, and a viral expansion loop.</tspan>
    </text>
  </g>

  <!-- ============ PRODUCT MOCKUP (y: 700-1080) ============ -->
  <g transform="translate(80, 700)" filter="url(#shadow)">
    <rect x="0" y="0" width="660" height="380" rx="20" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1"/>

    <rect x="0" y="0" width="660" height="48" rx="20" fill="#FAF7EE"/>
    <rect x="0" y="38" width="660" height="11" fill="#FAF7EE"/>
    <circle cx="24" cy="24" r="6" fill="#F87171"/>
    <circle cx="46" cy="24" r="6" fill="#FBBF24"/>
    <circle cx="68" cy="24" r="6" fill="#34D399"/>
    <text x="330" y="30" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#78716C" text-anchor="middle">gateway.aurimas.io / workspace</text>
    <line x1="0" y1="48" x2="660" y2="48" stroke="#E7E5E4" stroke-width="1"/>

    <g transform="translate(28, 76)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#FBF5E9" stroke="#EACD8F" stroke-width="1"/>
      <g transform="translate(10, 10)" stroke="#845B1E" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2.5L13.9 8.9L20.5 10.8L13.9 12.7L12 19.1L10.1 12.7L3.5 10.8L10.1 8.9L12 2.5Z"/>
        <path d="M19 17L19.7 18.7L21.5 19.5L19.7 20.3L19 22L18.3 20.3L16.5 19.5L18.3 18.7L19 17Z"/>
      </g>
      <text x="58" y="20" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#1C1917">SEO Analyzer</text>
      <text x="58" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#78716C">Marketing · Active</text>
      <g transform="translate(514, 8)">
        <rect x="0" y="0" width="84" height="28" rx="14" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
        <circle cx="14" cy="14" r="4" fill="#10B981"/>
        <text x="26" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#047857">LIVE</text>
      </g>
    </g>

    <g transform="translate(28, 148)">
      <rect x="0" y="0" width="440" height="86" rx="16" fill="#FAF7EE" stroke="#EFE3C7" stroke-width="1"/>
      <text x="18" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#845B1E" letter-spacing="0.6">SEO ANALYZER</text>
      <text x="18" y="52" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#1C1917">
        <tspan x="18" dy="0">Found 3 high-impact issues on your homepage:</tspan>
        <tspan x="18" dy="20">missing H1, slow LCP, weak meta descriptions.</tspan>
      </text>
    </g>

    <g transform="translate(284, 252)">
      <rect x="0" y="0" width="350" height="50" rx="16" fill="#1C1917"/>
      <text x="175" y="32" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FDFBF6" text-anchor="middle">Audit my homepage for SEO issues</text>
    </g>

    <g transform="translate(28, 320)">
      <rect x="0" y="0" width="604" height="44" rx="12" fill="#FAF7EE" stroke="#E7E5E4" stroke-width="1"/>
      <text x="20" y="29" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#A8A29E">Ask SEO Analyzer anything…</text>
      <rect x="556" y="6" width="32" height="32" rx="8" fill="#1C1917"/>
      <g transform="translate(564, 14)" stroke="#FDFBF6" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 8L17 0L9 17L7 9L0 8Z"/>
      </g>
    </g>
  </g>

  <!-- ============ RIGHT METRIC STACK (y: 700-1056) ============ -->
  <g transform="translate(780, 700)">
    <g filter="url(#lightShadow)">
      <rect x="0" y="0" width="340" height="108" rx="16" fill="#FFFFFF"/>
      <text x="22" y="50" font-family="Inter, sans-serif" font-size="44" font-weight="800" fill="#845B1E" letter-spacing="-1.5">3×</text>
      <text x="22" y="78" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1C1917">Faster Time-to-Value</text>
      <text x="22" y="96" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#78716C">Guided onboarding vs. blank chat</text>
    </g>

    <g transform="translate(0, 124)" filter="url(#lightShadow)">
      <rect x="0" y="0" width="340" height="108" rx="16" fill="#FFFFFF"/>
      <text x="22" y="50" font-family="Inter, sans-serif" font-size="44" font-weight="800" fill="#845B1E" letter-spacing="-1.5">+40%</text>
      <text x="22" y="78" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1C1917">Activation Lift</text>
      <text x="22" y="96" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#78716C">Variant B vs. control (simulated)</text>
    </g>

    <g transform="translate(0, 248)" filter="url(#lightShadow)">
      <rect x="0" y="0" width="340" height="108" rx="16" fill="url(#darkPanel)"/>
      <text x="22" y="50" font-family="Inter, sans-serif" font-size="44" font-weight="800" fill="#D4A452" letter-spacing="-1.5">K &gt; 0</text>
      <text x="22" y="78" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FDFBF6">Viral Coefficient</text>
      <text x="22" y="96" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#A8A29E">B2B team-invite expansion loop</text>
    </g>
  </g>

  <!-- ============ BOTTOM STRIP (y: 1110-1170) ============ -->
  <g transform="translate(80, 1110)">
    <line x1="0" y1="0" x2="1040" y2="0" stroke="#E7E5E4" stroke-width="1"/>

    <g transform="translate(0, 30)">
      <rect x="0" y="-22" width="380" height="44" rx="22" fill="url(#darkPanel)"/>
      <text x="22" y="-3" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#DCC89A" letter-spacing="2.5">TECH STACK</text>
      <text x="22" y="14" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#FDFBF6">React · TypeScript · Tailwind · Supabase · OpenAI</text>
    </g>

    <g transform="translate(1040, 30)">
      <text x="0" y="-3" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1C1917" text-anchor="end">Aurimas Aleksandras Nausėdas</text>
      <text x="0" y="14" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#78716C" text-anchor="end">AI Product Manager · aurimas.io</text>
    </g>
  </g>
</svg>
