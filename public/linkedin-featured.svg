<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="627" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDFBF6"/>
      <stop offset="0.55" stop-color="#F4ECD9"/>
      <stop offset="1" stop-color="#EFE3C7"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D4A452"/>
      <stop offset="1" stop-color="#845B1E"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C1917"/>
      <stop offset="1" stop-color="#292524"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1C1917" flood-opacity="0.10"/>
    </filter>
    <filter id="lightShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1C1917" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="627" fill="url(#bg)"/>

  <!-- decorative hexagons -->
  <g opacity="0.045" stroke="#1C1917" stroke-width="1.6" fill="none">
    <polygon points="1100,40 1140,62 1140,108 1100,130 1060,108 1060,62"/>
    <polygon points="1180,140 1220,162 1220,208 1180,230 1140,208 1140,162"/>
    <polygon points="1100,240 1140,262 1140,308 1100,330 1060,308 1060,262"/>
    <polygon points="60,520 100,542 100,588 60,610 20,588 20,542"/>
    <polygon points="140,420 180,442 180,488 140,510 100,488 100,442"/>
  </g>

  <!-- ============ TOP BAR ============ -->
  <g transform="translate(64, 52)">
    <polygon points="22,0 46,13 46,39 22,52 -2,39 -2,13" fill="url(#brass)"/>
    <text x="64" y="34" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#1C1917" letter-spacing="-0.4">AI Gateway</text>
    <g transform="translate(212, 6)">
      <rect x="0" y="0" width="148" height="36" rx="18" fill="#FBF5E9" stroke="#EACD8F" stroke-width="1.5"/>
      <text x="74" y="23" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#845B1E" text-anchor="middle" letter-spacing="2">PLG · CASE STUDY</text>
    </g>
  </g>

  <g transform="translate(1136, 76)">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" font-weight="600" fill="#845B1E" text-anchor="end">gateway.aurimas.io</text>
  </g>

  <!-- ============ LEFT: HEADLINE + SUBHEAD (compact) ============ -->
  <g transform="translate(64, 156)">
    <rect x="0" y="0" width="44" height="3" rx="1.5" fill="url(#brass)"/>
    <text x="0" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#845B1E" letter-spacing="3">SOLVING THE COLD-START PROBLEM</text>

    <text x="0" y="86" font-family="Inter, sans-serif" font-size="54" font-weight="800" fill="#1C1917" letter-spacing="-2">
      <tspan x="0" dy="0">AI onboarding,</tspan>
      <tspan x="0" dy="62">designed for</tspan>
      <tspan x="0" dy="62" fill="#845B1E">activation.</tspan>
    </text>

    <text x="0" y="288" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#57534E" letter-spacing="-0.2">
      <tspan x="0" dy="0">A working PLG prototype that replaces the blank chat with</tspan>
      <tspan x="0" dy="26">role-based onboarding, A/B testing, and a viral expansion loop.</tspan>
    </text>
  </g>

  <!-- ============ RIGHT: PRODUCT MOCKUP ============ -->
  <g transform="translate(704, 144)" filter="url(#shadow)">
    <rect x="0" y="0" width="432" height="328" rx="16" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1"/>

    <!-- window chrome -->
    <rect x="0" y="0" width="432" height="40" rx="16" fill="#FAF7EE"/>
    <rect x="0" y="32" width="432" height="9" fill="#FAF7EE"/>
    <circle cx="20" cy="20" r="5" fill="#F87171"/>
    <circle cx="38" cy="20" r="5" fill="#FBBF24"/>
    <circle cx="56" cy="20" r="5" fill="#34D399"/>
    <text x="216" y="25" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#78716C" text-anchor="middle">gateway.aurimas.io / workspace</text>
    <line x1="0" y1="40" x2="432" y2="40" stroke="#E7E5E4" stroke-width="1"/>

    <!-- agent header -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="36" height="36" rx="8" fill="#FBF5E9" stroke="#EACD8F" stroke-width="1"/>
      <g transform="translate(8, 8)" stroke="#845B1E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 2L11.6 7.4L17 9L11.6 10.6L10 16L8.4 10.6L3 9L8.4 7.4L10 2Z"/>
        <path d="M16 14L16.6 15.4L18 16L16.6 16.6L16 18L15.4 16.6L14 16L15.4 15.4L16 14Z"/>
      </g>
      <text x="48" y="16" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1C1917">SEO Analyzer</text>
      <text x="48" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#78716C">Marketing · Active</text>
      <g transform="translate(326, 6)">
        <rect x="0" y="0" width="68" height="22" rx="11" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
        <circle cx="12" cy="11" r="3" fill="#10B981"/>
        <text x="22" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#047857">LIVE</text>
      </g>
    </g>

    <!-- assistant bubble -->
    <g transform="translate(20, 116)">
      <rect x="0" y="0" width="296" height="68" rx="14" fill="#FAF7EE" stroke="#EFE3C7" stroke-width="1"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#845B1E" letter-spacing="0.5">SEO ANALYZER</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#1C1917">
        <tspan x="14" dy="0">Found 3 high-impact issues on your homepage:</tspan>
        <tspan x="14" dy="16">missing H1, slow LCP, weak meta descriptions.</tspan>
      </text>
    </g>

    <!-- user bubble -->
    <g transform="translate(176, 200)">
      <rect x="0" y="0" width="236" height="40" rx="14" fill="#1C1917"/>
      <text x="118" y="25" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#FDFBF6" text-anchor="middle">Audit my homepage for SEO issues</text>
    </g>

    <!-- input bar -->
    <g transform="translate(20, 260)">
      <rect x="0" y="0" width="392" height="48" rx="12" fill="#FAF7EE" stroke="#E7E5E4" stroke-width="1"/>
      <text x="16" y="29" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#A8A29E">Ask SEO Analyzer anything…</text>
      <rect x="350" y="8" width="32" height="32" rx="8" fill="#1C1917"/>
      <g transform="translate(359, 17)" stroke="#FDFBF6" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 7L14 0L7 14L6 8L0 7Z"/>
      </g>
    </g>
  </g>

  <!-- floating "16 agents" card -->
  <g transform="translate(644, 420)" filter="url(#shadow)">
    <rect x="0" y="0" width="208" height="56" rx="12" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1"/>
    <rect x="12" y="12" width="32" height="32" rx="8" fill="#FBF5E9"/>
    <g transform="translate(20, 20)" stroke="#845B1E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 1L9.3 5.4L13.7 6.7L9.3 8L8 12.4L6.7 8L2.3 6.7L6.7 5.4L8 1Z"/>
    </g>
    <text x="56" y="26" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1C1917">16 specialized agents</text>
    <text x="56" y="42" font-family="Inter, sans-serif" font-size="10" font-weight="400" fill="#78716C">Marketing · Eng · Legal · HR</text>
  </g>

  <!-- ============ BOTTOM STRIP: METRICS + TECH + AUTHOR ============ -->
  <g transform="translate(64, 510)" font-family="Inter, sans-serif">
    <!-- metric chip 1 -->
    <g filter="url(#lightShadow)">
      <rect x="0" y="0" width="116" height="56" rx="12" fill="#FFFFFF"/>
      <text x="14" y="26" font-size="22" font-weight="800" fill="#845B1E" letter-spacing="-0.5">3×</text>
      <text x="14" y="46" font-size="11" font-weight="500" fill="#57534E">Faster TTV</text>
    </g>
    <!-- metric chip 2 -->
    <g transform="translate(132, 0)" filter="url(#lightShadow)">
      <rect x="0" y="0" width="116" height="56" rx="12" fill="#FFFFFF"/>
      <text x="14" y="26" font-size="22" font-weight="800" fill="#845B1E" letter-spacing="-0.5">+40%</text>
      <text x="14" y="46" font-size="11" font-weight="500" fill="#57534E">Activation</text>
    </g>
    <!-- metric chip 3 -->
    <g transform="translate(264, 0)" filter="url(#lightShadow)">
      <rect x="0" y="0" width="124" height="56" rx="12" fill="#FFFFFF"/>
      <text x="14" y="26" font-size="22" font-weight="800" fill="#845B1E" letter-spacing="-0.5">K &gt; 0</text>
      <text x="14" y="46" font-size="11" font-weight="500" fill="#57534E">Viral coefficient</text>
    </g>
    <!-- tech stack pill -->
    <g transform="translate(404, 0)">
      <rect x="0" y="0" width="332" height="56" rx="12" fill="url(#darkPanel)"/>
      <text x="20" y="22" font-size="9" font-weight="700" fill="#DCC89A" letter-spacing="2">TECH STACK</text>
      <text x="20" y="42" font-size="12" font-weight="500" fill="#FDFBF6">React · TypeScript · Tailwind · Supabase · OpenAI</text>
    </g>
  </g>

  <!-- author at very bottom -->
  <g transform="translate(64, 595)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1C1917">Aurimas Aleksandras Nausėdas</text>
    <text x="220" y="0" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#78716C">· AI Product Manager · aurimas.io</text>
  </g>
</svg>
