<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Background: warm cream gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDFBF6"/>
      <stop offset="1" stop-color="#F4ECD9"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C8943B"/>
      <stop offset="1" stop-color="#845B1E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1C1917" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative hexagon pattern (faded) -->
  <g opacity="0.04" stroke="#1C1917" stroke-width="1.5" fill="none">
    <polygon points="1050,80 1090,102 1090,148 1050,170 1010,148 1010,102"/>
    <polygon points="1130,180 1170,202 1170,248 1130,270 1090,248 1090,202"/>
    <polygon points="1050,280 1090,302 1090,348 1050,370 1010,348 1010,302"/>
    <polygon points="90,480 130,502 130,548 90,570 50,548 50,502"/>
    <polygon points="170,380 210,402 210,448 170,470 130,448 130,402"/>
  </g>

  <!-- Top-left: brand -->
  <g transform="translate(80, 80)">
    <polygon points="20,0 42,12 42,36 20,48 -2,36 -2,12" fill="url(#brass)"/>
    <text x="60" y="32" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#1C1917" letter-spacing="-0.3">AI Gateway</text>
  </g>

  <!-- Top-right: Case Study badge -->
  <g transform="translate(900, 82)">
    <rect x="0" y="0" width="220" height="40" rx="20" fill="#FBF5E9" stroke="#EACD8F" stroke-width="1.5"/>
    <text x="110" y="26" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#845B1E" text-anchor="middle" letter-spacing="2">PRODUCT CASE STUDY</text>
  </g>

  <!-- Main headline -->
  <g transform="translate(80, 200)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#1C1917" letter-spacing="-2.5">
      <tspan x="0" dy="0">Solving the Cold-Start</tspan>
      <tspan x="0" dy="86">Problem in AI Platforms</tspan>
    </text>
  </g>

  <!-- Subhead / description -->
  <g transform="translate(80, 400)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="26" font-weight="400" fill="#57534E" letter-spacing="-0.4">
      <tspan x="0" dy="0">A Product-Led Growth prototype replacing the blank</tspan>
      <tspan x="0" dy="36">chat with role-based guided onboarding.</tspan>
    </text>
  </g>

  <!-- Metric chips -->
  <g transform="translate(80, 500)">
    <!-- Chip 1 -->
    <g>
      <rect x="0" y="0" width="180" height="60" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="18" y="26" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#845B1E">3×</text>
      <text x="18" y="48" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#57534E">Faster Time-to-Value</text>
    </g>
    <!-- Chip 2 -->
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="180" height="60" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="18" y="26" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#845B1E">+40%</text>
      <text x="18" y="48" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#57534E">Activation Lift</text>
    </g>
    <!-- Chip 3 -->
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="180" height="60" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="18" y="26" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#845B1E">K &gt; 0</text>
      <text x="18" y="48" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#57534E">Viral Coefficient</text>
    </g>
    <!-- Chip 4: Tech -->
    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="280" height="60" rx="12" fill="#1C1917"/>
      <text x="20" y="26" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#DCC89A" letter-spacing="1.5">TECH STACK</text>
      <text x="20" y="48" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#FDFBF6">React · TS · Supabase · OpenAI</text>
    </g>
  </g>

  <!-- Bottom-left: author -->
  <g transform="translate(80, 580)">
    <circle cx="16" cy="0" r="16" fill="url(#brass)"/>
    <text x="16" y="5" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FDFBF6" text-anchor="middle">A</text>
    <text x="44" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1C1917" dy="5">Aurimas</text>
    <text x="110" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#78716C" dy="5">· Fractional AI PM &amp; Architect</text>
  </g>

  <!-- Bottom-right: URL -->
  <g transform="translate(1120, 580)">
    <text x="0" y="5" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#845B1E" text-anchor="end">gateway.aurimas.io</text>
  </g>
</svg>
